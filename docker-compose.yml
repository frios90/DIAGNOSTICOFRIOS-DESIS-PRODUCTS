version: '3.8'

services:
  web:
    build: .
    container_name: prueba_productos_web
    ports:
      - "8888:8000"
    volumes:
      - ./:/var/www/html
    depends_on:
      - db

  db:
    image: postgres:17
    container_name: prueba_productos_db
    ports:
      - "5555:5432"
    environment:
      - POSTGRES_DB=diagnostico
      - POSTGRES_USER=diagnostico_usr
      - POSTGRES_PASSWORD=1234
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql:/docker-entrypoint-initdb.d
    restart: unless-stopped

volumes:
  postgres_data: